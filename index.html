<!doctype html>
<html lang="pt-br">
<meta charset="utf-8">
<title>Flappy</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#172c43;display:grid;place-items:center;font:16px system-ui;touch-action:none}
  canvas{display:block;max-width:100vw;max-height:100vh;box-shadow:0 20px 70px #0008}
  #hud{position:fixed;top:20px;left:0;right:0;text-align:center;color:#fff;font-weight:900;font-size:28px;text-shadow:0 3px 0 #273442,0 0 8px #0008;pointer-events:none}
  small{font-size:14px}
</style>
<canvas id="g" width="400" height="600"></canvas>
<div id="hud"></div>
<script>
const c=document.getElementById('g'),x=c.getContext('2d'),hud=document.getElementById('hud');
const G=.27,J=-5.7,GAP=148,W=68,GROUND=520;
let bird,pipes,score,best=+localStorage.flappy_best||0,history=JSON.parse(localStorage.flappy_history||'[]'),state,t=0,speed;

function reset(){
  bird={x:82,y:285,v:0,rot:0,wing:0};
  pipes=[makePipe(460,210)];
  score=0;speed=2.4;state='ready';
}
function makePipe(px,last){
  const target=Math.max(95,Math.min(330,(last??210)+(Math.random()-.5)*150));
  return{x:px,h:target,scored:false};
}
function jump(){
  if(state==='dead'&&bird.y>=GROUND-17){reset();return}
  if(state==='ready'||state==='play'){state='play';bird.v=J;bird.wing=1}
}
addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();jump()}});
addEventListener('pointerdown',jump);

function update(){
  t++;
  if(state==='ready') bird.y=285+Math.sin(t/14)*7;
  if(state==='play'){
    bird.v=Math.min(bird.v+G,7.2);bird.y+=bird.v;bird.rot+=(Math.max(-.4,Math.min(1.1,bird.v*.09))-bird.rot)*.1;
    speed=2.4+Math.min(score*.035,1.6);
    pipes.forEach(p=>p.x-=speed);
    const last=pipes[pipes.length-1];
    if(last.x<190)pipes.push(makePipe(430,last.h));
    pipes=pipes.filter(p=>p.x>-W-20);
    for(const p of pipes){
      if(bird.x+14>p.x&&bird.x-14<p.x+W&&(bird.y-12<p.h||bird.y+12>p.h+GAP)) die();
      if(!p.scored&&p.x+W<bird.x){p.scored=true;score++}
    }
    if(bird.y<12||bird.y+14>GROUND) die();
  }else if(state==='dead'&&bird.y<GROUND-17){
    bird.v=Math.min(bird.v+G*1.15,8);bird.y=Math.min(GROUND-17,bird.y+bird.v);bird.rot=Math.min(1.55,bird.rot+.06);
  }
  bird.wing=Math.max(0,bird.wing-.08);
}
function die(){
  if(state!=='play')return;
  state='dead';bird.v=Math.max(bird.v,1);
  if(score>best){best=score;localStorage.flappy_best=best}
  if(score){
    history.push({score,date:new Date().toLocaleDateString('pt-BR')});
    history.sort((a,b)=>b.score-a.score);history=history.slice(0,5);
    localStorage.flappy_history=JSON.stringify(history);
  }
}

function roundedRect(px,py,w,h,r){
  x.beginPath();x.roundRect(px,py,w,h,r);x.fill();x.stroke();
}
function background(){
  const sky=x.createLinearGradient(0,0,0,GROUND);
  sky.addColorStop(0,'#66cbea');sky.addColorStop(.7,'#c9f1ef');sky.addColorStop(1,'#f6df9a');
  x.fillStyle=sky;x.fillRect(0,0,c.width,GROUND);
  x.fillStyle='#fff7b0';x.beginPath();x.arc(325,85,38,0,7);x.fill();
  for(let i=0;i<5;i++){
    const px=(i*115-t*.12)%570-70,py=95+(i%3)*55;
    x.fillStyle='#fff9';x.beginPath();x.ellipse(px,py,35,13,0,0,7);x.ellipse(px+25,py-8,28,17,0,0,7);x.fill();
  }
  x.fillStyle='#73bd72';
  for(let i=0;i<7;i++){const px=(i*75-t*.3)%530-65;x.beginPath();x.arc(px,GROUND,70,Math.PI,0);x.fill()}
}
function pipe(p){
  const grad=x.createLinearGradient(p.x,0,p.x+W,0);
  grad.addColorStop(0,'#347d32');grad.addColorStop(.25,'#78d447');grad.addColorStop(.72,'#4cab38');grad.addColorStop(1,'#245f28');
  x.fillStyle=grad;x.strokeStyle='#1e5226';x.lineWidth=3;
  roundedRect(p.x, -12,W,p.h+12,5);
  roundedRect(p.x-6,p.h-27,W+12,28,5);
  roundedRect(p.x,p.h+GAP,W,GROUND-p.h-GAP+8,5);
  roundedRect(p.x-6,p.h+GAP-1,W+12,28,5);
  x.fillStyle='#ffffff35';x.fillRect(p.x+10,0,7,Math.max(0,p.h-28));x.fillRect(p.x+10,p.h+GAP+28,7,GROUND);
}
function drawBird(){
  x.save();x.translate(bird.x,bird.y);x.rotate(bird.rot);
  x.fillStyle='#0003';x.beginPath();x.ellipse(3,17,17,5,0,0,7);x.fill();
  const body=x.createRadialGradient(-5,-7,3,0,0,22);
  body.addColorStop(0,'#fff283');body.addColorStop(.55,'#f7c934');body.addColorStop(1,'#d78916');
  x.fillStyle=body;x.strokeStyle='#75491d';x.lineWidth=2.5;x.beginPath();x.ellipse(0,0,19,15,0,0,7);x.fill();x.stroke();
  x.fillStyle='#e89b20';x.beginPath();x.ellipse(-8,5,12,7,-.5,0,7);x.fill();x.stroke();
  x.save();x.rotate(-.35-bird.wing*.75);x.fillStyle='#f6b82d';x.beginPath();x.ellipse(-7,5,12,6,0,0,7);x.fill();x.stroke();x.restore();
  x.fillStyle='#fff';x.beginPath();x.arc(9,-6,7,0,7);x.fill();x.stroke();
  x.fillStyle='#222';x.beginPath();x.arc(11,-6,2.5,0,7);x.fill();
  x.fillStyle='#f16c32';x.beginPath();x.moveTo(16,-1);x.lineTo(30,3);x.lineTo(16,7);x.closePath();x.fill();x.stroke();
  x.restore();
}
function ground(){
  x.fillStyle='#c8df60';x.fillRect(0,GROUND,c.width,18);
  x.fillStyle='#6b9d40';x.fillRect(0,GROUND,400,5);
  x.fillStyle='#d8b76b';x.fillRect(0,GROUND+18,c.width,62);
  x.fillStyle='#b48c4a';
  for(let i=-1;i<9;i++)x.fillRect((i*55-t*speed)%500,GROUND+31,28,6);
}
function render(){
  background();pipes.forEach(pipe);ground();drawBird();
  const records=history.map((r,i)=>`${i+1}. ${r.score} — ${r.date}`).join('<br>');
  hud.innerHTML=state==='ready'?'FLAPPY<br><small>toque ou espaço para voar</small>':
    state==='dead'?`💥 ${score}<br><small>recorde ${best}<br><br>${records||'sem histórico'}<br><br>toque para reiniciar</small>`:score;
}
function loop(){update();render();requestAnimationFrame(loop)}
reset();loop();
</script>
